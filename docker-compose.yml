version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: hinge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hinge
      POSTGRES_PASSWORD: hingepass
      POSTGRES_DB: hingedb
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hinge-redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
